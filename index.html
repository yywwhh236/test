<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中药知识答题练习</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "Microsoft Yahei", sans-serif;
        }
        body {
            background-color: #f5f7fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: #ffffff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 650px;
            position: relative;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 16px;
            font-size: 22px;
        }
        .status-bar {
            display: flex;
            justify-content: space-between;
            color: #606266;
            font-size: 14px;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #ebeef5;
        }
        .herb-title {
            text-align: center;
            font-size: 28px;
            font-weight: bold;
            color: #27ae60;
            padding: 16px;
            background-color: #f0f9f4;
            border-radius: 8px;
            margin-bottom: 12px;
        }
        .tip-text {
            text-align: center;
            color: #909399;
            font-size: 13px;
            margin-bottom: 20px;
        }
        .form-item {
            margin-bottom: 18px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #34495e;
            font-weight: 500;
        }
        input, textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #dcdfe6;
            border-radius: 6px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus, textarea:focus {
            border-color: #27ae60;
        }
        input:disabled, textarea:disabled {
            background-color: #f5f7fa;
            color: #c0c4cc;
            cursor: not-allowed;
        }
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        .disabled-tip {
            color: #e6a23c;
            font-size: 14px;
            text-align: center;
            padding: 8px;
            background-color: #fdf6ec;
            border-radius: 6px;
            margin-bottom: 18px;
            display: none;
        }
        .disabled-tip.visible {
            display: block;
        }
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .submit-btn {
            background-color: #27ae60;
            color: #ffffff;
        }
        .submit-btn:hover {
            background-color: #219653;
        }
        .submit-btn:disabled {
            background-color: #95d5b2;
            cursor: not-allowed;
        }
        .show-answer-btn {
            background-color: #e6a23c;
            color: #ffffff;
            margin-top: 12px;
        }
        .show-answer-btn:hover {
            background-color: #cf9236;
        }
        .show-answer-btn.hidden {
            display: none;
        }
        .next-btn {
            background-color: #2f80ed;
            color: #ffffff;
            margin-top: 12px;
            display: none;
        }
        .next-btn:hover {
            background-color: #2b78e4;
        }
        .next-btn.visible {
            display: block;
        }
        .result-tip {
            margin-top: 20px;
            padding: 12px;
            border-radius: 6px;
            text-align: center;
            font-size: 15px;
            display: none;
        }
        .result-tip.correct {
            background-color: #f0f9f4;
            color: #27ae60;
            display: block;
        }
        .result-tip.wrong {
            background-color: #fef0f0;
            color: #f56c6c;
            display: block;
        }
        .answer-box {
            margin-top: 16px;
            padding: 16px;
            background-color: #fdf6ec;
            border-radius: 6px;
            display: none;
        }
        .answer-box.visible {
            display: block;
        }
        .answer-box h4 {
            color: #e6a23c;
            margin-bottom: 10px;
            font-size: 15px;
        }
        .answer-item {
            margin-bottom: 8px;
            font-size: 14px;
            color: #606266;
            line-height: 1.6;
        }
        .answer-item strong {
            color: #303133;
        }

        /* 结束页面样式 */
        .finish-panel {
            display: none;
            text-align: center;
            padding: 20px 0;
        }
        .finish-panel.visible {
            display: block;
        }
        .finish-panel h2 {
            color: #2c3e50;
            margin-bottom: 24px;
        }
        .score-card {
            background-color: #f9fafc;
            padding: 24px;
            border-radius: 8px;
            margin-bottom: 24px;
        }
        .score-item {
            margin-bottom: 12px;
            font-size: 16px;
            color: #606266;
        }
        .score-item strong {
            color: #303133;
            font-size: 18px;
        }
        .accuracy {
            font-size: 32px;
            font-weight: bold;
            color: #27ae60;
            margin: 16px 0;
        }
        .btn-group {
            display: flex;
            gap: 12px;
        }
        .btn-group .btn {
            flex: 1;
        }
        .restart-btn {
            background-color: #27ae60;
            color: white;
        }
        .restart-btn:hover {
            background-color: #219653;
        }
        .wrong-btn {
            background-color: #f56c6c;
            color: white;
        }
        .wrong-btn:hover {
            background-color: #e64242;
        }

        /* 错题列表样式 */
        .wrong-list-panel {
            display: none;
            margin-top: 24px;
            text-align: left;
        }
        .wrong-list-panel.visible {
            display: block;
        }
        .wrong-list-panel h3 {
            color: #f56c6c;
            margin-bottom: 16px;
            text-align: center;
        }
        .wrong-item {
            padding: 14px;
            background-color: #fef0f0;
            border-radius: 6px;
            margin-bottom: 12px;
        }
        .wrong-item .herb-name {
            font-weight: bold;
            color: #f56c6c;
            margin-bottom: 8px;
            font-size: 16px;
        }
        .back-btn {
            background-color: #909399;
            color: white;
            margin-top: 16px;
        }
        .back-btn:hover {
            background-color: #7d8086;
        }

        .quiz-area.hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>中药功效答题练习</h1>

        <!-- 答题区域 -->
        <div class="quiz-area" id="quizArea">
            <div class="status-bar">
                <span>进度：第 <span id="currentNum">1</span> / 20 题</span>
                <span>累计答对：<span id="correctNum">0</span> 题</span>
            </div>

            <div class="herb-title" id="herbName"></div>
            <div class="tip-text">若不会作答，可直接点击查看正确答案后进入下一题，查看答案后本题将计入错题</div>

            <div class="disabled-tip" id="disabledTip">已观看正确答案，不可继续答题</div>

            <div class="form-item">
                <label for="effectInput">功效</label>
                <textarea id="effectInput" placeholder="请输入该中药的功效"></textarea>
            </div>

            <div class="form-item">
                <label for="familyInput">科属</label>
                <input type="text" id="familyInput" placeholder="请输入该中药所属的科">
            </div>

            <div class="form-item">
                <label for="partInput">药用部位</label>
                <input type="text" id="partInput" placeholder="请输入该中药的药用部位">
            </div>

            <button class="btn submit-btn" id="submitBtn">提交答案</button>
            <button class="btn show-answer-btn" id="showAnswerBtn">查看正确答案</button>
            <button class="btn next-btn" id="nextBtn">下一题</button>
            
            <div class="result-tip" id="resultTip"></div>
            
            <div class="answer-box" id="answerBox">
                <h4>正确答案</h4>
                <div class="answer-item"><strong>功效：</strong><span id="answerEffect"></span></div>
                <div class="answer-item"><strong>科属：</strong><span id="answerFamily"></span></div>
                <div class="answer-item"><strong>药用部位：</strong><span id="answerPart"></span></div>
            </div>
        </div>

        <!-- 结束页面 -->
        <div class="finish-panel" id="finishPanel">
            <h2>答题完成</h2>
            <div class="score-card">
                <div class="score-item">总题数：<strong>20</strong> 道</div>
                <div class="score-item">答对：<strong id="finalCorrect">0</strong> 道</div>
                <div class="score-item">答错 / 查看答案：<strong id="finalWrong">0</strong> 道</div>
                <div class="accuracy" id="finalAccuracy">0%</div>
                <div class="score-item">正确率</div>
            </div>

            <div class="btn-group">
                <button class="btn restart-btn" id="restartBtn">重新答题</button>
                <button class="btn wrong-btn" id="showWrongBtn">观看错题</button>
            </div>

            <div class="wrong-list-panel" id="wrongListPanel">
                <h3>错题回顾</h3>
                <div id="wrongListContent"></div>
                <button class="btn back-btn" id="backBtn">返回结果页</button>
            </div>
        </div>
    </div>

    <script>
        // 全部中药数据
        const allHerbs = [
            { name: "龙胆", effect: "清热燥湿，泻肝胆火", family: "龙胆科", part: "根和根茎" },
            { name: "苦参", effect: "清热燥湿，杀虫，利尿", family: "豆科", part: "根" },
            { name: "白鲜皮", effect: "清热燥湿，祛风解毒", family: "芸香科", part: "根皮" },
            { name: "秦皮", effect: "清热燥湿，收涩止痢，止带，明目", family: "木犀科", part: "枝皮或干皮" },
            { name: "地黄", effect: "鲜地黄 清热生津，凉血，止血. 生地黄 清热凉血，养阴生津", family: "玄参科", part: "新鲜或干燥的块根" },
            { name: "玄参", effect: "清热凉血，滋阴降火，解毒散结", family: "玄参科", part: "根" },
            { name: "牡丹皮", effect: "清热凉血，活血化瘀", family: "毛茛科", part: "根皮" },
            { name: "赤芍", effect: "清热凉血，散瘀止痛", family: "毛茛科", part: "根" },
            { name: "紫草", effect: "清热凉血，活血解毒，透疹消斑", family: "紫草科", part: "根" },
            { name: "荷叶", effect: "清暑化湿，升发清阳，凉血止血", family: "睡莲科", part: "叶" },
            { name: "金银花", effect: "清热解毒，疏散风热", family: "忍冬科", part: "花蕾或带初开的花" },
            { name: "连翘", effect: "清热解毒，消肿散结，疏散风热", family: "木犀科", part: "果实" },
            { name: "板蓝根", effect: "清热解毒，凉血利咽", family: "十字花科", part: "根" },
            { name: "大青叶", effect: "清热解毒，凉血消斑", family: "十字花科", part: "叶" },
            { name: "青黛", effect: "清热解毒，凉血消斑，泻火定惊", family: "爵床科", part: "叶或茎叶加工制得的干燥粉末，团块或颗粒" },
            { name: "北豆根", effect: "清热解毒，祛风止痛", family: "防己科", part: "根茎" },
            { name: "山豆根", effect: "清热解毒，消肿利咽", family: "豆科", part: "根和根茎" },
            { name: "马勃", effect: "清肺利咽，止血", family: "灰包科", part: "子实体" },
            { name: "拳参", effect: "清热解毒，消肿，止血", family: "蓼科", part: "根茎" },
            { name: "漏芦", effect: "清热解毒，消痈，下乳，舒筋通脉", family: "菊科", part: "根" }
        ];

        // 全局状态
        let remainingHerbs = [];
        let currentHerb = null;
        let correctCount = 0;
        let wrongList = [];
        let answeredCount = 0;
        let isPassed = false;
        let hasSeenAnswer = false;

        // 文本标准化：去标点空格、字符排序，忽略顺序
        function formatText(text) {
            return text.replace(/[，。、\s.]/g, "").split("").sort().join("");
        }

        // 初始化答题
        function initQuiz() {
            remainingHerbs = [...allHerbs];
            correctCount = 0;
            wrongList = [];
            answeredCount = 0;
            
            document.getElementById("quizArea").classList.remove("hidden");
            document.getElementById("finishPanel").classList.remove("visible");
            document.getElementById("wrongListPanel").classList.remove("visible");
            
            updateStatus();
            loadQuestion();
        }

        // 随机抽取未答过的题目
        function getRandomHerb() {
            const index = Math.floor(Math.random() * remainingHerbs.length);
            const herb = remainingHerbs.splice(index, 1)[0];
            return herb;
        }

        // 更新顶部状态栏
        function updateStatus() {
            document.getElementById("currentNum").textContent = answeredCount + 1;
            document.getElementById("correctNum").textContent = correctCount;
        }

        // 加载新题目
        function loadQuestion() {
            if (remainingHerbs.length === 0) {
                showFinishPanel();
                return;
            }

            currentHerb = getRandomHerb();
            isPassed = false;
            hasSeenAnswer = false;

            // 重置界面状态
            document.getElementById("herbName").textContent = currentHerb.name;
            document.getElementById("effectInput").value = "";
            document.getElementById("familyInput").value = "";
            document.getElementById("partInput").value = "";
            
            // 启用输入
            document.getElementById("effectInput").disabled = false;
            document.getElementById("familyInput").disabled = false;
            document.getElementById("partInput").disabled = false;
            document.getElementById("submitBtn").disabled = false;
            
            document.getElementById("disabledTip").classList.remove("visible");
            document.getElementById("resultTip").className = "result-tip";
            document.getElementById("resultTip").textContent = "";
            // 默认显示查看答案按钮
            document.getElementById("showAnswerBtn").classList.remove("hidden");
            document.getElementById("answerBox").classList.remove("visible");
            document.getElementById("nextBtn").classList.remove("visible");

            updateStatus();
        }

        // 显示正确答案
        function showAnswer() {
            hasSeenAnswer = true;
            
            // 填充答案
            document.getElementById("answerEffect").textContent = currentHerb.effect;
            document.getElementById("answerFamily").textContent = currentHerb.family;
            document.getElementById("answerPart").textContent = currentHerb.part;
            document.getElementById("answerBox").classList.add("visible");
            document.getElementById("showAnswerBtn").classList.add("hidden");

            // 禁用答题
            document.getElementById("effectInput").disabled = true;
            document.getElementById("familyInput").disabled = true;
            document.getElementById("partInput").disabled = true;
            document.getElementById("submitBtn").disabled = true;
            document.getElementById("disabledTip").classList.add("visible");

            // 计入错题（去重，同一题只记录一次）
            if (!isPassed && !wrongList.find(item => item.name === currentHerb.name)) {
                wrongList.push({...currentHerb});
            }

            // 显示下一题
            document.getElementById("nextBtn").classList.add("visible");
        }

        // 提交答案校验
        function checkAnswer() {
            if (isPassed || hasSeenAnswer) return;

            const userEffect = document.getElementById("effectInput").value.trim();
            const userFamily = document.getElementById("familyInput").value.trim();
            const userPart = document.getElementById("partInput").value.trim();

            const effectRight = formatText(userEffect) === formatText(currentHerb.effect);
            const familyRight = formatText(userFamily) === formatText(currentHerb.family);
            const partRight = formatText(userPart) === formatText(currentHerb.part);

            const tipEl = document.getElementById("resultTip");

            if (effectRight && familyRight && partRight) {
                isPassed = true;
                correctCount++;
                answeredCount++;
                updateStatus();
                
                tipEl.textContent = "回答正确！";
                tipEl.className = "result-tip correct";
                // 答对后隐藏查看答案按钮
                document.getElementById("showAnswerBtn").classList.add("hidden");
                document.getElementById("nextBtn").classList.add("visible");
                document.getElementById("submitBtn").disabled = true;
            } else {
                let wrongMsg = "回答有误，错误项：";
                if (!effectRight) wrongMsg += "功效 ";
                if (!familyRight) wrongMsg += "科属 ";
                if (!partRight) wrongMsg += "药用部位";
                tipEl.textContent = wrongMsg;
                tipEl.className = "result-tip wrong";
                
                // 答错计入错题（去重，同一题只记录一次）
                if (!wrongList.find(item => item.name === currentHerb.name)) {
                    wrongList.push({...currentHerb});
                }
            }
        }

        // 下一题
        function nextQuestion() {
            if (!isPassed && !hasSeenAnswer) return;
            
            // 如果是看答案跳过的，也计入已答
            if (hasSeenAnswer && !isPassed) {
                answeredCount++;
            }
            
            loadQuestion();
        }

        // 显示结束页面
        function showFinishPanel() {
            document.getElementById("quizArea").classList.add("hidden");
            document.getElementById("finishPanel").classList.add("visible");

            const total = allHerbs.length;
            const accuracy = ((correctCount / total) * 100).toFixed(1);

            document.getElementById("finalCorrect").textContent = correctCount;
            document.getElementById("finalWrong").textContent = total - correctCount;
            document.getElementById("finalAccuracy").textContent = accuracy + "%";
        }

        // 显示错题列表
        function showWrongList() {
            const panel = document.getElementById("wrongListPanel");
            const content = document.getElementById("wrongListContent");
            
            if (wrongList.length === 0) {
                content.innerHTML = "<p style='text-align:center;color:#909399;'>恭喜！本次答题全部正确，没有错题。</p>";
            } else {
                let html = "";
                wrongList.forEach(herb => {
                    html += `
                    <div class="wrong-item">
                        <div class="herb-name">${herb.name}</div>
                        <div class="answer-item"><strong>功效：</strong>${herb.effect}</div>
                        <div class="answer-item"><strong>科属：</strong>${herb.family}</div>
                        <div class="answer-item"><strong>药用部位：</strong>${herb.part}</div>
                    </div>
                    `;
                });
                content.innerHTML = html;
            }

            panel.classList.add("visible");
        }

        // 返回结果页
        function backToFinish() {
            document.getElementById("wrongListPanel").classList.remove("visible");
        }

        // 绑定事件
        document.getElementById("submitBtn").addEventListener("click", checkAnswer);
        document.getElementById("showAnswerBtn").addEventListener("click", showAnswer);
        document.getElementById("nextBtn").addEventListener("click", nextQuestion);
        document.getElementById("restartBtn").addEventListener("click", initQuiz);
        document.getElementById("showWrongBtn").addEventListener("click", showWrongList);
        document.getElementById("backBtn").addEventListener("click", backToFinish);

        // 回车快捷提交
        document.querySelectorAll("input, textarea").forEach(element => {
            element.addEventListener("keydown", function(e) {
                if (e.key === "Enter" && !e.shiftKey) {
                    e.preventDefault();
                    checkAnswer();
                }
            });
        });

        // 初始化
        initQuiz();
    </script>
</body>
</html>
